name: Java CI with Maven

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    
    runs-on: ${{ matrix.os }}

    steps:
    - name: Checkout mã nguồn
      uses: actions/checkout@v4

    - name: Thiết lập JDK 11 (Môi trường Java)
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'
        cache: maven

    # Đã sửa "test package" thành "verify" theo đúng đề bài Bài 5
    - name: Build dự án và Check Coverage
      working-directory: ./BankSystem
      run: mvn clean verify

    - name: Upload file JAR lên Artifact
      uses: actions/upload-artifact@v4
      with:
        name: banksystem-jar-${{ matrix.os }}
        path: BankSystem/target/*.jar

    # Thêm bước tải báo cáo Coverage theo yêu cầu Bài 5
    - name: Upload JaCoCo Coverage Report
      uses: actions/upload-artifact@v4
      with:
        name: jacoco-report-${{ matrix.os }}
        path: BankSystem/target/site/jacoco/