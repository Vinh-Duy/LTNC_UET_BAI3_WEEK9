name: Java CI with Maven

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    # 1. Thêm chiến lược Matrix ở đây
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    
    # 2. Sửa lại môi trường chạy linh hoạt theo Matrix
    runs-on: ${{ matrix.os }}

    steps:
    - name: Checkout mã nguồn
      uses: actions/checkout@v4

    - name: Thiết lập JDK 11 (Môi trường Java)
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'
        cache: maven

    - name: Build dự án với Maven (Test & Package)
      working-directory: ./BankSystem
      run: mvn clean test package

    - name: Upload file JAR lên Artifact
      uses: actions/upload-artifact@v4
      with:
        name: banksystem-jar-${{ matrix.os }} # Đổi tên artifact để không bị trùng
        path: BankSystem/target/*.jar